<!DOCTYPE html>
<html lang="en" data-theme="mocha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinyVoice — Voice Message</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--crust); color: var(--text);
  height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  width: min(90vw, 420px);
  background: var(--base); border: 1px solid var(--surface0);
  border-radius: 16px; padding: 32px; text-align: center;
}
h1 { font-size: 1.1rem; color: var(--text); margin-bottom: 4px; }
.sub { font-size: 0.75rem; color: var(--overlay); margin-bottom: 24px; }
.bytes {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; color: var(--surface2);
  word-break: break-all; line-height: 1.5;
  max-height: 60px; overflow: hidden;
  margin-bottom: 16px; padding: 10px;
  background: var(--mantle); border-radius: 8px;
}
.play-btn {
  width: 80px; height: 80px; border-radius: 50%;
  border: 2px solid var(--accent); background: var(--mantle);
  color: var(--accent); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 2rem; transition: all 0.15s;
  margin-bottom: 12px;
}
.play-btn:hover { background: var(--surface0); transform: scale(1.05); }
.play-btn.loading { border-color: var(--yellow); color: var(--yellow); animation: pulse 1.2s ease infinite; }
.play-btn.playing { border-color: var(--green); color: var(--green); }
.play-btn:disabled { opacity: 0.3; cursor: not-allowed; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.status { font-size: 0.78rem; color: var(--overlay); min-height: 1.5em; }
.status.ok { color: var(--green); }
.status.err { color: var(--red); }
.meta {
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--surface0);
  display: flex; justify-content: center; gap: 24px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--overlay);
}
.meta b { color: var(--text); font-weight: 600; }
.prog { width: 100%; height: 2px; background: var(--surface0); border-radius: 1px; overflow: hidden; margin: 12px 0; }
.prog-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }
.empty { color: var(--overlay); font-size: 0.85rem; }
.record-link { display: inline-block; margin-top: 16px; font-size: 0.75rem; color: var(--accent); text-decoration: none; }
.record-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card" id="card">
  <h1>TinyVoice</h1>
  <p class="sub">voice message in a QR code</p>
  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
<script>
const SR = 16000, NFFT = 1024, HOP = 320, WLEN = 1024, PAD = 352;
const MODEL_BASE = 'https://huggingface.co/skymorphosis/focalcodec-onnx/resolve/main/';

// Get voice data from query string
const params = new URLSearchParams(location.search);
const voiceB64 = params.get('v');

const content = document.getElementById('content');

if (!voiceB64) {
  content.innerHTML = `
    <p class="empty">No voice message in this link.</p>
    <a class="record-link" href="./">Record a voice message &rarr;</a>
  `;
} else {
  // Decode base64 to bytes
  const raw = atob(voiceB64);
  const data = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) data[i] = raw.charCodeAt(i);

  const nTokens = data.length / 2;
  const durationEstimate = (nTokens / 50).toFixed(1);

  content.innerHTML = `
    <div class="bytes">${voiceB64.slice(0, 120)}...</div>
    <button class="play-btn" id="play-btn" onclick="playMessage()">&#9654;</button>
    <div class="prog"><div class="prog-fill" id="prog"></div></div>
    <div class="status" id="status">Tap to play</div>
    <div class="meta">
      <span><b>${data.length}</b> bytes</span>
      <span><b>${nTokens}</b> tokens</span>
      <span>~<b>${durationEstimate}</b>s</span>
    </div>
  `;

  let istftWin = null;
  let decSess = null;
  let played = false;

  // iSTFT
  function irfft(re,im,n){const fR=new Float32Array(n),fI=new Float32Array(n);const h=re.length;for(let i=0;i<h;i++){fR[i]=re[i];fI[i]=im[i]}for(let i=h;i<n;i++){fR[i]=fR[n-i];fI[i]=-fI[n-i]}let j=0;for(let i=0;i<n;i++){if(i<j){[fR[i],fR[j]]=[fR[j],fR[i]];[fI[i],fI[j]]=[fI[j],fI[i]]}let m=n>>1;while(m>=1&&j>=m){j-=m;m>>=1}j+=m}for(let s=2;s<=n;s*=2){const hs=s/2,a=2*Math.PI/s;for(let i=0;i<n;i+=s)for(let k=0;k<hs;k++){const c=Math.cos(a*k),sn=Math.sin(a*k),tR=c*fR[i+hs+k]-sn*fI[i+hs+k],tI=sn*fR[i+hs+k]+c*fI[i+hs+k];fR[i+hs+k]=fR[i+k]-tR;fI[i+hs+k]=fI[i+k]-tI;fR[i+k]+=tR;fI[i+k]+=tI}}const o=new Float32Array(n);for(let i=0;i<n;i++)o[i]=fR[i]/n;return o}
  function istft(mag,ph){const hN=NFFT/2+1,T=mag.length/hN,oS=(T-1)*HOP+WLEN;const o=new Float32Array(oS),wE=new Float32Array(oS);for(let t=0;t<T;t++){const off=t*hN,r=new Float32Array(hN),im=new Float32Array(hN);for(let f=0;f<hN;f++){r[f]=mag[off+f]*Math.cos(ph[off+f]);im[f]=mag[off+f]*Math.sin(ph[off+f])}const fr=irfft(r,im,NFFT),st=t*HOP;for(let i=0;i<WLEN;i++){o[st+i]+=fr[i]*istftWin[i];wE[st+i]+=istftWin[i]*istftWin[i]}}for(let i=0;i<oS;i++)if(wE[i]>1e-8)o[i]/=wE[i];return o.slice(PAD,oS-PAD)}

  async function playMessage() {
    const btn = document.getElementById('play-btn');
    const status = document.getElementById('status');
    const prog = document.getElementById('prog');

    if (played && window._audioBuffer) {
      // Replay without re-decoding
      const ctx = new AudioContext({ sampleRate: SR });
      const src = ctx.createBufferSource();
      src.buffer = window._audioBuffer;
      src.connect(ctx.destination);
      btn.className = 'play-btn playing';
      btn.innerHTML = '&#9646;&#9646;';
      src.onended = () => { btn.className = 'play-btn'; btn.innerHTML = '&#9654;'; };
      src.start();
      return;
    }

    btn.disabled = true;
    btn.className = 'play-btn loading';
    btn.innerHTML = '&#8987;';

    try {
      // Load iSTFT window
      status.textContent = 'Loading iSTFT...';
      prog.style.width = '5%';
      const wr = await fetch(MODEL_BASE + 'istft_window.json');
      istftWin = new Float32Array(await wr.json());

      // Load decoder
      status.textContent = 'Loading decoder (135 MB)...';
      const resp = await fetch(MODEL_BASE + 'decoder_50hz.onnx');
      const total = +resp.headers.get('Content-Length') || 141000000;
      const reader = resp.body.getReader();
      const chunks = [];
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        prog.style.width = (5 + (received/total) * 70) + '%';
      }
      const modelBytes = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) { modelBytes.set(chunk, offset); offset += chunk.length; }

      status.textContent = 'Initializing decoder...';
      prog.style.width = '80%';
      decSess = await ort.InferenceSession.create(modelBytes.buffer, { executionProviders: ['wasm'] });

      // Decode tokens
      status.textContent = 'Decoding voice...';
      prog.style.width = '90%';
      const tokens = new BigInt64Array(nTokens);
      const dv = new DataView(data.buffer);
      for (let i = 0; i < nTokens; i++) tokens[i] = BigInt(dv.getUint16(i*2, true));

      const input = new ort.Tensor('int64', tokens, [1, nTokens]);
      const result = await decSess.run({ tokens: input });
      const audio = istft(result.magnitude.data, result.phase.data);

      prog.style.width = '100%';

      // Play
      const ctx = new AudioContext({ sampleRate: SR });
      const buf = ctx.createBuffer(1, audio.length, SR);
      buf.getChannelData(0).set(audio);
      window._audioBuffer = buf;

      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);

      btn.className = 'play-btn playing';
      btn.innerHTML = '&#9646;&#9646;';
      btn.disabled = false;
      played = true;
      status.className = 'status ok';
      status.textContent = `Decoded ${(audio.length/SR).toFixed(1)}s from ${data.length} bytes`;

      src.onended = () => { btn.className = 'play-btn'; btn.innerHTML = '&#9654;'; };
      src.start();

    } catch (e) {
      status.className = 'status err';
      status.textContent = 'Error: ' + e.message;
      btn.className = 'play-btn';
      btn.innerHTML = '&#9654;';
      btn.disabled = false;
      console.error(e);
    }
  }
}
</script>
</body>
</html>
