<!DOCTYPE html>
<html lang="en" data-theme="mocha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinyVoice QR</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--crust); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }

.app { width:min(92vw, 440px); }

.header { text-align:center; margin-bottom:20px; }
.header h1 { font-size:1.1rem; color:var(--text); }
.header .sub { font-size:0.72rem; color:var(--overlay); margin-top:2px; }

/* Mode tabs */
.modes { display:flex; gap:4px; margin-bottom:16px; background:var(--mantle); border-radius:10px; padding:3px; }
.mode-btn { flex:1; padding:10px; border:none; background:none; color:var(--overlay); font-family:'Inter',sans-serif; font-size:0.8rem; font-weight:500; cursor:pointer; border-radius:8px; transition:all 0.15s; }
.mode-btn.active { background:var(--surface0); color:var(--text); }
.mode-btn:hover:not(.active) { color:var(--subtext); }

.panel { display:none; background:var(--base); border:1px solid var(--surface0); border-radius:14px; padding:24px; }
.panel.active { display:block; }

/* ── Record panel ──────────────────── */
.rec-btn { width:100px; height:100px; border-radius:50%; border:2px solid var(--surface1); background:var(--mantle); color:var(--overlay); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; font-family:'Inter',sans-serif; font-size:0.75rem; font-weight:600; transition:all 0.15s; margin:0 auto 12px; user-select:none; -webkit-user-select:none; touch-action:none; }
.rec-btn:hover { border-color:var(--surface2); background:var(--surface0); color:var(--subtext); }
.rec-btn.recording { border-color:var(--red); background:color-mix(in srgb,var(--red) 8%,var(--base)); color:var(--red); }
.rec-btn.encoding { border-color:var(--yellow); color:var(--yellow); }
.rec-btn.disabled { opacity:0.15; cursor:not-allowed; }
.rec-btn .icon { font-size:1.6rem; }
.rec-hint { text-align:center; font-size:0.65rem; color:var(--overlay); margin-bottom:16px; }
.rec-status { text-align:center; font-size:0.75rem; color:var(--overlay); min-height:1.4em; margin-bottom:8px; }
.rec-status.ok { color:var(--green); }
.rec-status.err { color:var(--red); }

.rec-progress { width:100%; height:2px; background:var(--surface0); border-radius:1px; overflow:hidden; margin-bottom:16px; }
.rec-progress-fill { height:100%; width:0%; background:var(--accent); transition:width 0.3s; }

/* QR result */
.qr-result { display:none; text-align:center; }
.qr-result img { border-radius:8px; background:white; padding:8px; margin-bottom:12px; }
.qr-meta { display:flex; justify-content:center; gap:16px; font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--overlay); margin-bottom:12px; }
.qr-meta b { color:var(--text); font-weight:600; }
.qr-url-row { display:flex; gap:4px; margin-bottom:8px; }
.qr-url { flex:1; min-width:0; padding:7px 10px; background:var(--mantle); border:1px solid var(--surface0); border-radius:7px; color:var(--subtext); font-family:'JetBrains Mono',monospace; font-size:0.6rem; }
.qr-url:focus { outline:none; }
.copy-btn { padding:7px 14px; border:1px solid var(--surface0); background:var(--surface0); color:var(--subtext); border-radius:7px; cursor:pointer; font-family:'Inter',sans-serif; font-size:0.72rem; font-weight:500; transition:all 0.1s; white-space:nowrap; }
.copy-btn:hover { background:var(--surface1); color:var(--text); }
.dl-btn { display:inline-block; padding:7px 14px; border:1px solid var(--surface0); background:var(--surface0); color:var(--subtext); border-radius:7px; cursor:pointer; font-family:'Inter',sans-serif; font-size:0.72rem; font-weight:500; transition:all 0.1s; text-decoration:none; margin-top:4px; }
.dl-btn:hover { background:var(--surface1); color:var(--text); }
.new-btn { display:inline-block; margin-top:12px; padding:7px 14px; border:1px solid var(--surface0); background:none; color:var(--overlay); border-radius:7px; cursor:pointer; font-family:'Inter',sans-serif; font-size:0.72rem; transition:all 0.1s; }
.new-btn:hover { background:var(--surface0); color:var(--text); }

/* ── QR result ────────────────────── */
.qr-main {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.qr-main img { border-radius: 10px; background: white; padding: 8px; }
.qr-actions { display: flex; gap: 6px; width: 100%; }
.qr-actions > * { flex: 1; text-align: center; }

.preview-btn {
  padding: 6px 20px; border: 1px solid var(--surface0);
  background: var(--surface0); color: var(--subtext);
  border-radius: 20px; cursor: pointer;
  font-family: 'Inter', sans-serif; font-size: 0.72rem;
  font-weight: 500; transition: all 0.12s;
}
.preview-btn:hover { background: var(--surface1); color: var(--text); }
.preview-btn.playing { border-color: var(--green); color: var(--green); }
.preview-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Hex sidebar ─────────────────── */
.hex-sidebar {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(45vw, 360px);
  background: var(--base); border-left: 1px solid var(--surface0);
  display: flex; flex-direction: column;
  z-index: 100; transition: transform 0.25s ease;
  box-shadow: -4px 0 20px rgba(0,0,0,0.3);
}
.hex-sidebar.hidden { transform: translateX(100%); pointer-events: none; }
.hex-sidebar-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--surface0);
  font-size: 0.7rem; font-weight: 600; color: var(--overlay);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.hex-close {
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: var(--surface0); color: var(--overlay);
  cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
}
.hex-close:hover { background: var(--surface1); color: var(--text); }

.hex-stream {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
  line-height: 1.7; word-break: break-all;
  color: var(--surface2);
}
.hex-stream .b {
  display: inline-block; width: 1.5em; text-align: center;
  transition: color 0.1s, text-shadow 0.1s;
}
.hex-stream .b.lit {
  color: var(--green);
  text-shadow: 0 0 6px color-mix(in srgb, var(--green) 40%, transparent);
}
.hex-stream .b.done { color: var(--overlay); }

/* ── Quality picker ───────────────── */
.quality-picker {
  display: flex; gap: 4px; margin-bottom: 10px;
  background: var(--mantle); border-radius: 8px; padding: 3px;
}
.quality-opt {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 6px 4px; border-radius: 6px; cursor: pointer;
  transition: all 0.12s; text-align: center;
}
.quality-opt:hover { background: var(--surface0); }
.quality-opt input { display: none; }
.quality-opt input:checked + .quality-label { color: var(--text); }
.quality-opt input:checked ~ .quality-desc { color: var(--subtext); }
.quality-opt:has(input:checked) { background: var(--surface0); }
.quality-label { font-size: 0.72rem; font-weight: 600; color: var(--overlay); transition: color 0.12s; }
.quality-desc { font-size: 0.5rem; color: var(--surface2); margin-top: 1px; transition: color 0.12s; }
.cache-dot { font-size: 0.55rem; color: var(--surface2); }
.cache-dot.cached { color: var(--green); }

/* ── Decode panel ──────────────────── */
.dropzone { border:2px dashed var(--surface1); border-radius:12px; padding:28px 16px; cursor:pointer; transition:all 0.15s; text-align:center; margin-bottom:12px; }
.dropzone:hover,.dropzone.dragover { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 5%,var(--base)); }
.dropzone .icon { font-size:1.8rem; margin-bottom:6px; }
.dropzone .label { font-size:0.78rem; color:var(--subtext); }
.dropzone .hint { font-size:0.62rem; color:var(--overlay); margin-top:4px; }

.or-divider { text-align:center; font-size:0.65rem; color:var(--surface2); margin:12px 0; }

.cam-section { text-align:center; }
.cam-wrap { position:relative; border-radius:12px; overflow:hidden; background:var(--mantle); margin-bottom:8px; }
.cam-wrap video { width:100%; display:block; border-radius:12px; }
.cam-wrap canvas { display:none; }
.cam-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.cam-crosshair { width:160px; height:160px; border:2px solid var(--accent); border-radius:12px; opacity:0.4; }
.cam-status { font-size:0.7rem; color:var(--overlay); margin-bottom:8px; }
.cam-btn { padding:8px 18px; border:1px solid var(--surface0); background:var(--surface0); color:var(--subtext); border-radius:7px; cursor:pointer; font-family:'Inter',sans-serif; font-size:0.75rem; transition:all 0.1s; }
.cam-btn:hover { background:var(--surface1); color:var(--text); }
.cam-btn.active { border-color:var(--red); color:var(--red); }

/* Player */
.dec-player { display:none; text-align:center; margin-top:16px; padding-top:16px; border-top:1px solid var(--surface0); }
.play-btn { width:64px; height:64px; border-radius:50%; border:2px solid var(--accent); background:var(--mantle); color:var(--accent); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; font-size:1.6rem; transition:all 0.15s; margin-bottom:8px; }
.play-btn:hover { background:var(--surface0); transform:scale(1.05); }
.play-btn.loading { border-color:var(--yellow); color:var(--yellow); animation:pulse 1.2s ease infinite; }
.play-btn.playing { border-color:var(--green); color:var(--green); }
.play-btn:disabled { opacity:0.3; cursor:not-allowed; }
.dec-quality-switch { display:flex; align-items:center; gap:4px; margin:8px 0; justify-content:center; }
.dec-q-label { font-size:0.6rem; color:var(--overlay); margin-right:4px; }
.dec-q-btn { padding:3px 8px; border:1px solid var(--surface0); background:none; color:var(--overlay); border-radius:4px; cursor:pointer; font-size:0.6rem; font-family:'Inter',sans-serif; transition:all 0.1s; }
.dec-q-btn:hover { background:var(--surface0); color:var(--text); }
.dec-q-btn.active { background:var(--surface0); color:var(--text); font-weight:600; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.dec-status { font-size:0.72rem; color:var(--overlay); min-height:1.4em; }
.dec-status.ok { color:var(--green); }
.dec-status.err { color:var(--red); }
.dec-prog { width:100%; height:2px; background:var(--surface0); border-radius:1px; overflow:hidden; margin:8px 0; }
.dec-prog-fill { height:100%; width:0%; background:var(--accent); transition:width 0.3s; }

.back-link { display:block; text-align:center; margin-top:16px; font-size:0.7rem; color:var(--overlay); text-decoration:none; }
.back-link:hover { color:var(--accent); }

#file-input { display:none; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>TinyVoice QR</h1>
    <div class="sub">voice messages as QR codes</div>
  </div>

  <div class="modes">
    <button class="mode-btn active" onclick="setMode('record')">Record</button>
    <button class="mode-btn" onclick="setMode('decode')">Decode</button>
  </div>

  <!-- RECORD -->
  <div class="panel active" id="panel-record">
    <div style="text-align:center">
      <button class="rec-btn disabled" id="rec-btn"
        onpointerdown="recDown(event)" onpointerup="recUp(event)" onpointerleave="recUp(event)">
        <span class="icon">🎙</span>
        <span>HOLD</span>
      </button>
      <div class="rec-hint">hold to record &middot; release to encode</div>
    </div>
    <div class="quality-picker">
      <label class="quality-opt">
        <input type="radio" name="quality" value="12_5hz" checked onchange="onQualityChange()">
        <span class="quality-label">12.5hz <span class="cache-dot" id="cache-12_5hz">↓</span></span>
        <span class="quality-desc">tiny QR &middot; ~144B</span>
      </label>
      <label class="quality-opt">
        <input type="radio" name="quality" value="25hz" onchange="onQualityChange()">
        <span class="quality-label">25hz <span class="cache-dot" id="cache-25hz">↓</span></span>
        <span class="quality-desc">balanced &middot; ~288B</span>
      </label>
      <label class="quality-opt">
        <input type="radio" name="quality" value="50hz" onchange="onQualityChange()">
        <span class="quality-label">50hz <span class="cache-dot" id="cache-50hz">↓</span></span>
        <span class="quality-desc">best quality &middot; ~576B</span>
      </label>
    </div>
    <div class="rec-progress"><div class="rec-progress-fill" id="rec-prog"></div></div>
    <div class="rec-status" id="rec-status">Load models first</div>
    <button class="copy-btn" id="load-btn" onclick="loadEncoder()" style="display:block;width:100%;margin-bottom:12px">Load Models</button>
    <div class="qr-result" id="qr-result">
      <div class="qr-main">
        <img id="qr-img" width="180" height="180" alt="QR code" style="display:none">
        <div class="qr-meta">
          <span><b id="qr-bytes">0</b> bytes</span>
          <span><b id="qr-tokens">0</b> tokens</span>
          <span><b id="qr-dur">0</b>s</span>
        </div>
        <button class="preview-btn" id="preview-btn" onclick="previewEncoded()">&#9654; Preview</button>
        <div class="qr-url-row">
          <input class="qr-url" id="qr-url" readonly onclick="this.select()">
          <button class="copy-btn" onclick="copyUrl()">Copy</button>
        </div>
        <div class="qr-actions">
          <a class="dl-btn" id="dl-link" download="tinyvoice-qr.png">Download QR</a>
          <button class="new-btn" onclick="resetRecord()">Record another</button>
        </div>
      </div>
    </div>
    <!-- Hex panel slides in from right -->
    <div class="hex-sidebar hidden" id="hex-sidebar">
      <div class="hex-sidebar-hdr">
        <span>Token Data</span>
        <button class="hex-close" onclick="document.getElementById('hex-sidebar').classList.add('hidden')">&times;</button>
      </div>
      <div class="hex-stream" id="hex-stream"></div>
    </div>
  </div>

  <!-- DECODE -->
  <div class="panel" id="panel-decode">
    <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📂</div>
      <div class="label">Drop a file or QR screenshot</div>
      <div class="hint">raw token bytes, QR image, or .bin file</div>
    </div>
    <input type="file" id="file-input" accept="*/*" onchange="handleFile(this.files[0])">

    <div class="or-divider">— or scan with camera —</div>

    <div class="cam-section">
      <div class="cam-wrap" id="cam-wrap" style="display:none">
        <video id="cam-video" autoplay playsinline muted></video>
        <canvas id="cam-canvas"></canvas>
        <div class="cam-overlay"><div class="cam-crosshair"></div></div>
      </div>
      <div class="cam-status" id="cam-status"></div>
      <button class="cam-btn" id="cam-btn" onclick="toggleCam()">Start Camera</button>
    </div>

    <div class="dec-player" id="dec-player">
      <button class="play-btn" id="play-btn" onclick="decodeAndPlay()">&#9654;</button>
      <div class="dec-quality-switch">
        <span class="dec-q-label">Decoder:</span>
        <button class="dec-q-btn active" data-q="auto" onclick="setDecQuality('auto')">Auto</button>
        <button class="dec-q-btn" data-q="12_5hz" onclick="setDecQuality('12_5hz')">12.5hz</button>
        <button class="dec-q-btn" data-q="25hz" onclick="setDecQuality('25hz')">25hz</button>
        <button class="dec-q-btn" data-q="50hz" onclick="setDecQuality('50hz')">50hz</button>
      </div>
      <div class="dec-prog"><div class="dec-prog-fill" id="dec-prog"></div></div>
      <div class="dec-status" id="dec-status"></div>
    </div>
  </div>

  <a class="back-link" href="./">&larr; back to PTT</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
<script>
const SR=16000, NFFT=1024, HOP=320, WLEN=1024, PAD=352;
const MODEL_BASE='https://huggingface.co/skymorphosis/focalcodec-onnx/resolve/main/';

let encSess=null, compSessions={}, decSessions={}, istftWin=null, playCtx=null;
let mic=null, actx=null, isRec=false, recChunks=[];
let currentQuality = '12_5hz';

function getQuality() {
  return document.querySelector('input[name="quality"]:checked')?.value || '12_5hz';
}
function onQualityChange() {
  currentQuality = getQuality();
  const st = document.getElementById('rec-status');
  if (encSess && !compSessions[currentQuality]) {
    st.textContent = `Switch to ${currentQuality} — will download compressor on first use`;
    st.className = 'rec-status';
  } else if (encSess) {
    st.textContent = `Ready (${currentQuality})`;
    st.className = 'rec-status ok';
  }
}

// Check IndexedDB for cached models and mark quality options
async function updateCacheIndicators() {
  const models = [
    { key: 'encoder.onnx', el: 'cache-encoder' },
    { key: 'compressor_12_5hz.onnx', el: 'cache-12_5hz' },
    { key: 'compressor_25hz.onnx', el: 'cache-25hz' },
    { key: 'compressor_50hz.onnx', el: 'cache-50hz' },
    { key: 'decoder_12_5hz.onnx', el: 'cache-dec-12_5hz' },
    { key: 'decoder_25hz.onnx', el: 'cache-dec-25hz' },
    { key: 'decoder_50hz.onnx', el: 'cache-dec-50hz' },
  ];
  for (const m of models) {
    const el = document.getElementById(m.el);
    if (!el) continue;
    const cached = await getCached(m.key);
    if (cached && cached.byteLength > 1048576) {
      el.textContent = '✓';
      el.title = `Cached (${(cached.byteLength/1048576).toFixed(0)} MB)`;
      el.classList.add('cached');
    } else {
      el.textContent = '↓';
      el.title = 'Not cached — will download';
      el.classList.remove('cached');
    }
  }
}
// Run on page load
updateCacheIndicators();

// === IndexedDB Cache (shared with main app) ===
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('focalcodec-models', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('models');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function getCached(key) {
  const db = await openDB();
  return new Promise(resolve => {
    const tx = db.transaction('models', 'readonly');
    const req = tx.objectStore('models').get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => resolve(null);
  });
}
async function setCache(key, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('models', 'readwrite');
    tx.objectStore('models').put(data, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    tx.onabort = () => reject(tx.error);
  });
}

async function dlModel(name, onProgress, statusEl) {
  // Check cache first
  const cached = await getCached(name);
  if (cached && cached.byteLength > 1048576) {
    if (statusEl) statusEl.textContent = `${name} (cached, ${(cached.byteLength/1048576).toFixed(0)} MB)`;
    onProgress(1);
    return cached;
  }

  // Download
  if (statusEl) statusEl.textContent = `Downloading ${name}...`;
  const resp = await fetch(MODEL_BASE + name);
  const total = +resp.headers.get('Content-Length') || 1;
  const reader = resp.body.getReader();
  const chunks = []; let received = 0;
  while (true) {
    const {done,value} = await reader.read();
    if (done) break;
    chunks.push(value); received += value.length;
    onProgress(received / total);
  }
  const result = new Uint8Array(received);
  let off = 0;
  for (const c of chunks) { result.set(c, off); off += c.length; }

  // Cache for next time
  try { await setCache(name, result.buffer); } catch(e) {}

  return result.buffer;
}

// === MODE SWITCHING ===
function setMode(m) {
  document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&m==='record')||(i===1&&m==='decode')));
  document.getElementById('panel-record').classList.toggle('active', m==='record');
  document.getElementById('panel-decode').classList.toggle('active', m==='decode');
  if (m==='record') stopCam();
}

// === iSTFT ===
function irfft(re,im,n){const fR=new Float32Array(n),fI=new Float32Array(n);const h=re.length;for(let i=0;i<h;i++){fR[i]=re[i];fI[i]=im[i]}for(let i=h;i<n;i++){fR[i]=fR[n-i];fI[i]=-fI[n-i]}let j=0;for(let i=0;i<n;i++){if(i<j){[fR[i],fR[j]]=[fR[j],fR[i]];[fI[i],fI[j]]=[fI[j],fI[i]]}let m=n>>1;while(m>=1&&j>=m){j-=m;m>>=1}j+=m}for(let s=2;s<=n;s*=2){const hs=s/2,a=2*Math.PI/s;for(let i=0;i<n;i+=s)for(let k=0;k<hs;k++){const c=Math.cos(a*k),sn=Math.sin(a*k),tR=c*fR[i+hs+k]-sn*fI[i+hs+k],tI=sn*fR[i+hs+k]+c*fI[i+hs+k];fR[i+hs+k]=fR[i+k]-tR;fI[i+hs+k]=fI[i+k]-tI;fR[i+k]+=tR;fI[i+k]+=tI}}const o=new Float32Array(n);for(let i=0;i<n;i++)o[i]=fR[i]/n;return o}
function istft(mag,ph){const hN=NFFT/2+1,T=mag.length/hN,oS=(T-1)*HOP+WLEN;const o=new Float32Array(oS),wE=new Float32Array(oS);for(let t=0;t<T;t++){const off=t*hN,r=new Float32Array(hN),im=new Float32Array(hN);for(let f=0;f<hN;f++){r[f]=mag[off+f]*Math.cos(ph[off+f]);im[f]=mag[off+f]*Math.sin(ph[off+f])}const fr=irfft(r,im,NFFT),st=t*HOP;for(let i=0;i<WLEN;i++){o[st+i]+=fr[i]*istftWin[i];wE[st+i]+=istftWin[i]*istftWin[i]}}for(let i=0;i<oS;i++)if(wE[i]>1e-8)o[i]/=wE[i];return o.slice(PAD,oS-PAD)}

// === LOAD COMPRESSOR ON DEMAND ===
async function loadCompressor(quality, st, prog, pStart, pEnd) {
  if (compSessions[quality]) return; // already loaded
  const name = `compressor_${quality}.onnx`;
  const bytes = await dlModel(name, p => { if(prog) prog.style.width = (pStart + p*(pEnd-pStart))+'%'; }, st);
  if(st) st.textContent = `Initializing ${quality} compressor...`;
  compSessions[quality] = await ort.InferenceSession.create(bytes, {executionProviders:['wasm']});
}

async function loadDecoder(quality, st, prog, pStart, pEnd) {
  if (decSessions[quality]) return;
  const name = `decoder_${quality}.onnx`;
  const bytes = await dlModel(name, p => { if(prog) prog.style.width = (pStart + p*(pEnd-pStart))+'%'; }, st);
  if(st) st.textContent = `Initializing ${quality} decoder...`;
  decSessions[quality] = await ort.InferenceSession.create(bytes, {executionProviders:['wasm']});
}

// === ENCODER LOADING ===
async function loadEncoder() {
  const btn = document.getElementById('load-btn');
  const st = document.getElementById('rec-status');
  const prog = document.getElementById('rec-prog');
  btn.disabled = true; btn.textContent = 'Loading...';

  try {
    st.textContent = 'Requesting microphone...';
    mic = await navigator.mediaDevices.getUserMedia({audio:{sampleRate:SR,channelCount:1}});
    actx = new AudioContext({sampleRate:SR});

    // Load shared WavLM encoder
    const encBytes = await dlModel('encoder.onnx', p => { prog.style.width = (p*70)+'%'; st.textContent = `Encoder: ${(p*595).toFixed(0)} / 595 MB`; }, st);
    st.textContent = 'Initializing encoder...';
    prog.style.width = '72%';
    encSess = await ort.InferenceSession.create(encBytes, {executionProviders:['wasm']});

    // Load selected quality compressor
    currentQuality = getQuality();
    await loadCompressor(currentQuality, st, prog, 72, 92);

    prog.style.width = '100%';
    st.className = 'rec-status ok';
    st.textContent = `Ready (${currentQuality}) — hold to record`;
    btn.style.display = 'none';
    document.getElementById('rec-btn').classList.remove('disabled');
    updateCacheIndicators();
  } catch (e) {
    st.className = 'rec-status err';
    st.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Retry';
  }
}

// === RECORD ===
let sp = null;
function recDown(e) {
  e.preventDefault();
  if (!encSess || isRec) return;
  isRec = true; recChunks = [];
  const btn = document.getElementById('rec-btn');
  btn.classList.add('recording');
  document.getElementById('rec-status').textContent = 'Recording...';
  document.getElementById('rec-status').className = 'rec-status';

  const src = actx.createMediaStreamSource(mic);
  sp = actx.createScriptProcessor(4096,1,1);
  sp.onaudioprocess = ev => { if(isRec) recChunks.push(new Float32Array(ev.inputBuffer.getChannelData(0))); };
  src.connect(sp); sp.connect(actx.destination);
}

async function recUp(e) {
  if (e) e.preventDefault();
  if (!isRec) return;
  isRec = false;
  if (sp) { sp.disconnect(); sp = null; }

  const btn = document.getElementById('rec-btn');
  btn.classList.remove('recording');
  btn.classList.add('encoding');
  btn.querySelector('.icon').textContent = '⏳';
  btn.querySelector('span:last-child').textContent = 'ENCODING';

  // Force UI update before heavy WASM work blocks the thread
  await new Promise(r => setTimeout(r, 50));

  const st = document.getElementById('rec-status');
  const prog = document.getElementById('rec-prog');

  const tl = recChunks.reduce((s,c) => s+c.length, 0);
  if (tl < 4096) {
    st.className = 'rec-status err';
    st.textContent = 'Too short — hold longer';
    btn.classList.remove('encoding');
    btn.querySelector('.icon').textContent = '🎙';
    return;
  }
  const audio = new Float32Array(tl);
  let off = 0;
  for (const c of recChunks) { audio.set(c, off); off += c.length; }
  const dur = (tl/SR).toFixed(1);

  st.textContent = `Encoding ${dur}s...`;
  prog.style.width = '50%';

  try {
    // Ensure compressor for selected quality is loaded
    currentQuality = getQuality();
    if (!compSessions[currentQuality]) {
      st.textContent = `Loading ${currentQuality} compressor...`;
      await loadCompressor(currentQuality, st, prog, 50, 65);
    }

    // Two-stage: encoder → features → compressor → tokens
    st.textContent = `Encoding (${currentQuality})...`;
    const feats = await encSess.run({audio: new ort.Tensor('float32', audio, [1, tl])});
    prog.style.width = '80%';
    st.textContent = `Compressing (${currentQuality})...`;
    const r = await compSessions[currentQuality].run({features: feats.features});
    const tok = r.tokens.data;
    prog.style.width = '100%';

    // Pack: 1-byte magic header + token data
    // Magic: 0x01=50hz, 0x02=25hz, 0x03=12.5hz
    const MAGIC = { '50hz': 0x01, '25hz': 0x02, '12_5hz': 0x03 };
    const pk = new Uint8Array(1 + tok.length * 2);
    pk[0] = MAGIC[currentQuality] || 0x03;
    const dv = new DataView(pk.buffer);
    for (let i = 0; i < tok.length; i++) dv.setUint16(1 + i*2, Number(tok[i]), true);

    // Show result
    document.getElementById('qr-result').style.display = 'block';

    // Build hex in sidebar
    const hexSidebar = document.getElementById('hex-sidebar');
    const hexEl = document.getElementById('hex-stream');
    hexEl.innerHTML = '';
    hexSidebar.classList.remove('hidden');
    const hexChars = [];
    for (let i = 0; i < pk.length; i++) {
      const span = document.createElement('span');
      span.className = 'b';
      span.textContent = pk[i].toString(16).padStart(2, '0');
      hexEl.appendChild(span);
      if (i < pk.length - 1) hexEl.appendChild(document.createTextNode(' '));
      hexChars.push(span);
    }

    // Animate bytes lighting up
    st.textContent = 'Packing tokens...';
    const step = Math.max(1, Math.floor(pk.length / 40));
    for (let i = 0; i < hexChars.length; i += step) {
      for (let j = i; j < Math.min(i + step, hexChars.length); j++) {
        hexChars[j].classList.add('lit');
      }
      hexEl.scrollTop = hexEl.scrollHeight;
      await new Promise(r => setTimeout(r, 25));
    }
    // Fade to done
    await new Promise(r => setTimeout(r, 200));
    hexChars.forEach(s => { s.classList.remove('lit'); s.classList.add('done'); });

    const b64 = btoa(String.fromCharCode(...pk));
    const playUrl = `${location.origin}/qr.html?v=${encodeURIComponent(b64)}`;

    // Show QR
    document.getElementById('qr-bytes').textContent = pk.length;
    document.getElementById('qr-tokens').textContent = tok.length;
    document.getElementById('qr-dur').textContent = dur;
    document.getElementById('qr-url').value = playUrl;

    const qrImg = document.getElementById('qr-img');
    qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(playUrl);
    qrImg.crossOrigin = 'anonymous';
    qrImg.style.display = 'block';
    qrImg.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = qrImg.naturalWidth; cv.height = qrImg.naturalHeight;
      cv.getContext('2d').drawImage(qrImg, 0, 0);
      document.getElementById('dl-link').href = cv.toDataURL('image/png');
    };

    // Store for preview playback
    window._previewTokens = pk;
    window._previewQuality = currentQuality;

    st.className = 'rec-status ok';
    st.textContent = `${dur}s → ${pk.length} bytes → QR ready`;
  } catch (e) {
    st.className = 'rec-status err';
    st.textContent = e.message;
  }

  btn.classList.remove('encoding');
  btn.querySelector('.icon').textContent = '🎙';
  btn.querySelector('span:last-child').textContent = 'HOLD';
}

function resetRecord() {
  document.getElementById('qr-result').style.display = 'none';
  document.getElementById('hex-sidebar').classList.add('hidden');
  document.getElementById('rec-prog').style.width = '0%';
  document.getElementById('rec-status').className = 'rec-status ok';
  document.getElementById('rec-status').textContent = 'Ready — hold to record';
}

function copyUrl() {
  const input = document.getElementById('qr-url');
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = input.nextElementSibling;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// === DECODE: DROP ===
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  if (file.type.startsWith('image/')) {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas'); cv.width=img.width; cv.height=img.height;
      const ctx = cv.getContext('2d'); ctx.drawImage(img,0,0);
      const qr = jsQR(ctx.getImageData(0,0,cv.width,cv.height).data, cv.width, cv.height);
      if (qr) handleQR(qr.data);
      else setDecStatus('No QR found in image', 'err');
    };
    img.src = URL.createObjectURL(file);
    return;
  }
  const reader = new FileReader();
  reader.onload = () => showDecPlayer(new Uint8Array(reader.result));
  reader.readAsArrayBuffer(file);
}

function handleQR(str) {
  try { const u=new URL(str); const v=u.searchParams.get('v'); if(v){const r=atob(decodeURIComponent(v));const d=new Uint8Array(r.length);for(let i=0;i<r.length;i++)d[i]=r.charCodeAt(i);showDecPlayer(d);return;}} catch{}
  try { const r=atob(str);const d=new Uint8Array(r.length);for(let i=0;i<r.length;i++)d[i]=r.charCodeAt(i);if(d.length>=4&&d.length%2===0){showDecPlayer(d);return;}} catch{}
  setDecStatus('QR does not contain voice data', 'err');
}

function setDecStatus(msg, cls='') {
  const el = document.getElementById('dec-status');
  el.className = 'dec-status' + (cls ? ' '+cls : '');
  el.textContent = msg;
}

// === DECODE: CAMERA ===
let camStream=null, scanIv=null;
function toggleCam() {
  if (camStream) { stopCam(); return; }
  const btn=document.getElementById('cam-btn'), st=document.getElementById('cam-status'), video=document.getElementById('cam-video');
  document.getElementById('cam-wrap').style.display = 'block';
  btn.textContent='Starting...'; st.textContent='Requesting camera...';
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream => {
    camStream=stream; video.srcObject=stream;
    btn.textContent='Stop'; btn.classList.add('active');
    st.textContent='Point at QR code';
    const cv=document.getElementById('cam-canvas'), ctx=cv.getContext('2d',{willReadFrequently:true});
    scanIv=setInterval(()=>{if(video.readyState!==video.HAVE_ENOUGH_DATA)return;cv.width=video.videoWidth;cv.height=video.videoHeight;ctx.drawImage(video,0,0);const qr=jsQR(ctx.getImageData(0,0,cv.width,cv.height).data,cv.width,cv.height);if(qr){stopCam();handleQR(qr.data);}},250);
  }).catch(e=>{st.textContent='Camera: '+e.message;btn.textContent='Start Camera';document.getElementById('cam-wrap').style.display='none';});
}
function stopCam() {
  if(scanIv){clearInterval(scanIv);scanIv=null;}
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  document.getElementById('cam-btn').textContent='Start Camera';
  document.getElementById('cam-btn').classList.remove('active');
  document.getElementById('cam-status').textContent='';
  document.getElementById('cam-wrap').style.display='none';
}

// === DECODE: PLAYER ===
let decData=null, decNTokens=0, audioBuffer=null, currentSource=null, isPlaying=false;

const MAGIC_TO_QUALITY = { 0x01: '50hz', 0x02: '25hz', 0x03: '12_5hz' };
let decQualityOverride = null; // null = auto

function setDecQuality(q) {
  decQualityOverride = q === 'auto' ? null : q;
  audioBuffer = null; // force re-decode
  document.querySelectorAll('.dec-q-btn').forEach(b => b.classList.toggle('active', b.dataset.q === q));
  const active = decQualityOverride || window._decQuality || '12_5hz';
  setDecStatus(`Decoder set to ${decQualityOverride || 'auto (' + (window._decQuality||'?') + ')'} — tap play`);
}
const QUALITY_RATES = { '50hz': 50, '25hz': 25, '12_5hz': 12.5 };

function parseTokenData(data) {
  // Check for magic byte header
  if (data.length >= 3 && data[0] >= 0x01 && data[0] <= 0x03 && (data.length - 1) % 2 === 0) {
    return {
      quality: MAGIC_TO_QUALITY[data[0]],
      tokens: data.slice(1),
    };
  }
  // Legacy: no header, guess from token count (old links)
  if (data.length >= 4 && data.length % 2 === 0) {
    const nTok = data.length / 2;
    const quality = nTok <= 100 ? '12_5hz' : nTok <= 200 ? '25hz' : '50hz';
    return { quality, tokens: data };
  }
  return null;
}

function showDecPlayer(data) {
  const parsed = parseTokenData(data);
  if (!parsed) { setDecStatus('Invalid voice data', 'err'); return; }

  decData = parsed.tokens;
  decNTokens = parsed.tokens.length / 2;
  audioBuffer = null;
  window._decQuality = parsed.quality;

  // Build hex display
  const player = document.getElementById('dec-player');
  player.style.display='block';
  let hexEl = document.getElementById('dec-hex');
  if (!hexEl) {
    hexEl = document.createElement('div');
    hexEl.id = 'dec-hex';
    hexEl.className = 'hex-stream';
    player.insertBefore(hexEl, player.firstChild);
  }
  hexEl.innerHTML = '';
  window._decHexSpans = [];
  for (let i = 0; i < parsed.tokens.length; i++) {
    const span = document.createElement('span');
    span.className = 'b';
    span.textContent = parsed.tokens[i].toString(16).padStart(2, '0');
    hexEl.appendChild(span);
    if (i < data.length - 1) hexEl.appendChild(document.createTextNode(' '));
    window._decHexSpans.push(span);
  }

  const gq = window._decQuality;
  const estRate = QUALITY_RATES[gq] || 12.5;
  const hasMagic = data.length >= 3 && data[0] >= 0x01 && data[0] <= 0x03;
  setDecStatus(`${parsed.tokens.length}B, ${decNTokens} tok, ~${(decNTokens/estRate).toFixed(1)}s · ${gq}${hasMagic ? '' : ' (guessed)'} — tap play`);
}

async function decodeAndPlay() {
  const btn=document.getElementById('play-btn'), st=document.getElementById('dec-status'), prog=document.getElementById('dec-prog');

  // Stop if currently playing
  if (isPlaying && currentSource) {
    try { currentSource.stop(); } catch(e) {}
    currentSource = null;
    isPlaying = false;
    btn.className='play-btn';btn.innerHTML='&#9654;';
    return;
  }

  // Replay from cached buffer
  if (audioBuffer) {
    if(!playCtx||playCtx.state==='closed') playCtx=new AudioContext({sampleRate:SR});
    if(playCtx.state==='suspended') await playCtx.resume();
    const src=playCtx.createBufferSource();src.buffer=audioBuffer;src.connect(playCtx.destination);
    currentSource=src; isPlaying=true;
    btn.className='play-btn playing';btn.innerHTML='&#9632;';
    src.onended=()=>{btn.className='play-btn';btn.innerHTML='&#9654;';isPlaying=false;currentSource=null;};
    src.start(); return;
  }

  btn.disabled=true;btn.className='play-btn loading';btn.innerHTML='&#8987;';
  try {
    st.textContent='Loading iSTFT...';prog.style.width='5%';
    const wr=await fetch(MODEL_BASE+'istft_window.json');istftWin=new Float32Array(await wr.json());

    const dq = decQualityOverride || window._decQuality || '12_5hz';
    await loadDecoder(dq, st, prog, 5, 80);

    // Animate hex bytes lighting up during decode
    st.textContent='Decoding...';prog.style.width='90%';
    const spans = window._decHexSpans || [];
    if (spans.length) {
      const step = Math.max(1, Math.floor(spans.length / 30));
      for (let i = 0; i < spans.length; i += step) {
        for (let j = i; j < Math.min(i + step, spans.length); j++) spans[j].classList.add('lit');
        await new Promise(r => setTimeout(r, 20));
      }
    }

    const tokens=new BigInt64Array(decNTokens);
    const dv=new DataView(decData.buffer,decData.byteOffset,decData.byteLength);
    for(let i=0;i<decNTokens;i++) tokens[i]=BigInt(dv.getUint16(i*2,true));

    const dq2 = decQualityOverride || window._decQuality || '12_5hz';
    const result=await decSessions[dq2].run({tokens:new ort.Tensor('int64',tokens,[1,decNTokens])});
    const audio=istft(result.magnitude.data,result.phase.data);
    prog.style.width='100%';

    // Fade hex bytes after decode
    if (spans.length) spans.forEach(s => { s.classList.remove('lit'); s.classList.add('done'); });

    playCtx=new AudioContext({sampleRate:SR});
    audioBuffer=playCtx.createBuffer(1,audio.length,SR);
    audioBuffer.getChannelData(0).set(audio);

    const src=playCtx.createBufferSource();src.buffer=audioBuffer;src.connect(playCtx.destination);
    currentSource=src; isPlaying=true;
    btn.className='play-btn playing';btn.innerHTML='&#9632;';btn.disabled=false;
    st.className='dec-status ok';st.textContent=`${(audio.length/SR).toFixed(1)}s decoded from ${decData.length} bytes — click to stop`;
    src.onended=()=>{btn.className='play-btn';btn.innerHTML='&#9654;';isPlaying=false;currentSource=null;};
    src.start();
  } catch(e) {
    st.className='dec-status err';st.textContent=e.message;
    btn.className='play-btn';btn.innerHTML='&#9654;';btn.disabled=false;
  }
}

// === PREVIEW ENCODED AUDIO ===
async function previewEncoded() {
  const pk = window._previewTokens;
  if (!pk) return;
  const btn = document.getElementById('preview-btn');
  const st = document.getElementById('rec-status');

  // Need decoder to preview — use same quality as recording
  const q = window._previewQuality || currentQuality;
  if (!decSessions[q]) {
    btn.disabled = true;
    btn.textContent = `Loading ${q} decoder...`;
    try {
      if (!istftWin) {
        const wr = await fetch(MODEL_BASE + 'istft_window.json');
        istftWin = new Float32Array(await wr.json());
      }
      await loadDecoder(q, st, null, 0, 100);
    } catch(e) {
      st.className = 'rec-status err'; st.textContent = e.message;
      btn.disabled = false; btn.textContent = '\u25B6 Preview'; return;
    }
  }

  btn.textContent = 'Decoding...';
  try {
    const nTokens = pk.length / 2;
    const tokens = new BigInt64Array(nTokens);
    const dv = new DataView(pk.buffer, pk.byteOffset, pk.byteLength);
    for (let i = 0; i < nTokens; i++) tokens[i] = BigInt(dv.getUint16(i*2, true));

    const result = await decSessions[q].run({tokens: new ort.Tensor('int64', tokens, [1, nTokens])});
    const audio = istft(result.magnitude.data, result.phase.data);

    if (!playCtx || playCtx.state === 'closed') playCtx = new AudioContext({sampleRate: SR});
    if (playCtx.state === 'suspended') await playCtx.resume();
    const buf = playCtx.createBuffer(1, audio.length, SR);
    buf.getChannelData(0).set(audio);
    const src = playCtx.createBufferSource();
    src.buffer = buf;
    src.connect(playCtx.destination);

    btn.className = 'preview-btn playing';
    btn.textContent = '\u25A0 Playing...';
    src.onended = () => { btn.className = 'preview-btn'; btn.textContent = '\u25B6 Preview'; };
    src.start();
  } catch(e) {
    st.className = 'rec-status err'; st.textContent = e.message;
    btn.textContent = '\u25B6 Preview';
  }
  btn.disabled = false;
}

// === AUTO-DECODE FROM URL ===
const params = new URLSearchParams(location.search);
const voiceB64 = params.get('v');
if (voiceB64) {
  try {
    const raw = atob(decodeURIComponent(voiceB64));
    const data = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) data[i] = raw.charCodeAt(i);
    setMode('decode');
    showDecPlayer(data);
  } catch (e) {
    setDecStatus('Invalid voice data in URL', 'err');
  }
}
