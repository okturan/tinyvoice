name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test, type-check, and build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      WRANGLER_LOG_PATH: /tmp/tinyvoice-wrangler.log

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.20.0
          cache: npm

      - name: Use the repository npm version
        run: npm install --global npm@11.17.0

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Audit all production and development dependencies
        run: npm run audit

      - name: Run unit and Cloudflare runtime tests
        run: npm test

      - name: Check generated Worker types
        run: npm run worker:types:check

      - name: Type-check browser, Worker, and tests
        run: npm run typecheck

      - name: Build the frontend
        run: npm run build

      - name: Bundle the Worker without deploying
        run: npm run worker:dry-run

      - name: Check patch hygiene
        run: |
          git diff --check
          git diff --exit-code
